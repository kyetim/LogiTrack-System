version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15
    container_name: logitrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logitrack_user
      POSTGRES_PASSWORD: logitrack_password
      POSTGRES_DB: logitrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logitrack-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U logitrack_user -d logitrack_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: logitrack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - logitrack-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer - Database management tool
  adminer:
    image: adminer:latest
    container_name: logitrack-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - logitrack-network
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  logitrack-network:
    driver: bridge
