services:
  # PostgreSQL database with PostGIS
  postgres:
    image: postgis/postgis:15-3.4
    container_name: logitrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logitrack_user
      POSTGRES_PASSWORD: logitrack_password
      POSTGRES_DB: logitrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logitrack-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U logitrack_user -d logitrack_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: logitrack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - logitrack-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer - Database management tool
  adminer:
    image: adminer:latest
    container_name: logitrack-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - logitrack-network
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: logitrack-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./backend/mosquitto/config:/mosquitto/config
      - ./backend/mosquitto/data:/mosquitto/data
      - ./backend/mosquitto/log:/mosquitto/log
    networks:
      - logitrack-network
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 | grep -v Error || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  logitrack-network:
    driver: bridge
